<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Analysis Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        /* Fallback styles in case Tailwind doesn't load */
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #581c87 50%, #0f172a 100%);
            font-family: system-ui, -apple-system, sans-serif;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 2rem;
        }
        
        .input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 0.75rem;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        
        .input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        
        .input:focus {
            border-color: #a855f7;
            box-shadow: 0 0 0 2px rgba(168, 85, 247, 0.5);
        }
        
        .btn {
            width: 100%;
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            border: none;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #7c3aed, #2563eb);
            color: white;
        }
        
        .btn-primary:hover:not(:disabled) {
            background: linear-gradient(135deg, #6d28d9, #1d4ed8);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #059669, #047857);
            color: white;
        }
        
        .btn-success:hover {
            background: linear-gradient(135deg, #047857, #065f46);
        }
        
        .btn:disabled {
            background: #6b7280;
            cursor: not-allowed;
        }
        
        .text-white { color: white; }
        .text-gray-300 { color: #d1d5db; }
        .text-red-300 { color: #fca5a5; }
        .text-green-400 { color: #4ade80; }
        .text-purple-400 { color: #c084fc; }
        .text-center { text-align: center; }
        .font-bold { font-weight: 700; }
        .font-medium { font-weight: 500; }
        .text-3xl { font-size: 1.875rem; }
        .text-sm { font-size: 0.875rem; }
        .text-xs { font-size: 0.75rem; }
        .mb-8 { margin-bottom: 2rem; }
        .mb-4 { margin-bottom: 1rem; }
        .mb-3 { margin-bottom: 0.75rem; }
        .mt-4 { margin-top: 1rem; }
        .mt-8 { margin-top: 2rem; }
        .py-8 { padding-top: 2rem; padding-bottom: 2rem; }
        .px-4 { padding-left: 1rem; padding-right: 1rem; }
        .p-6 { padding: 1.5rem; }
        .p-4 { padding: 1rem; }
        .p-3 { padding: 0.75rem; }
        .max-w-md { max-width: 28rem; }
        .max-w-4xl { max-width: 56rem; }
        .mx-auto { margin-left: auto; margin-right: auto; }
        .flex { display: flex; }
        .items-center { align-items: center; }
        .justify-center { justify-content: center; }
        .gap-3 { gap: 0.75rem; }
        .gap-2 { gap: 0.5rem; }
        .space-y-4 > * + * { margin-top: 1rem; }
        .block { display: block; }
        .inline-flex { display: inline-flex; }
        .hidden { display: none !important; }
        .w-8 { width: 2rem; }
        .h-8 { height: 2rem; }
        .w-5 { width: 1.25rem; }
        .h-5 { height: 1.25rem; }
        .w-4 { width: 1rem; }
        .h-4 { height: 1rem; }
        .rounded-2xl { border-radius: 1rem; }
        .rounded-xl { border-radius: 0.75rem; }
        .rounded-lg { border-radius: 0.5rem; }
        .uppercase { text-transform: uppercase; }
        .cursor-pointer { cursor: pointer; }
        .overflow-y-auto { overflow-y: auto; }
        .whitespace-pre-wrap { white-space: pre-wrap; }
        .break-words { word-wrap: break-word; }
        .max-h-96 { max-height: 24rem; }
        
        .error-box {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 0.5rem;
            padding: 0.75rem;
            color: #fca5a5;
            font-size: 0.875rem;
        }
        
        .success-box {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.2);
            border-radius: 1rem;
            padding: 1.5rem;
        }
        
        .preview-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
        }
        
        .spinner {
            border: 2px solid #ffffff;
            border-top: 2px solid transparent;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Ensure Tailwind classes work when loaded */
        .bg-gradient-to-br { background-image: linear-gradient(to bottom right, var(--tw-gradient-stops)); }
        .from-slate-900 { --tw-gradient-from: #0f172a; --tw-gradient-stops: var(--tw-gradient-from), var(--tw-gradient-to, rgba(15, 23, 42, 0)); }
        .via-purple-900 { --tw-gradient-stops: var(--tw-gradient-from), #581c87, var(--tw-gradient-to, rgba(88, 28, 135, 0)); }
        .to-slate-900 { --tw-gradient-to: #0f172a; }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900">
    <div class="container mx-auto px-4 py-8">
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="flex items-center justify-center gap-3 mb-4">
                <svg class="w-8 h-8 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path>
                </svg>
                <h1 class="text-3xl font-bold text-white">Stock Analysis Generator</h1>
            </div>
            <p class="text-gray-300">Enter a stock ticker to generate your analysis template</p>
        </div>

        <!-- Input Section -->
        <div class="max-w-md mx-auto mb-8">
            <div class="card">
                <label class="block text-white font-medium mb-3">Stock Ticker Symbol</label>
                <div class="space-y-4">
                    <input 
                        type="text" 
                        id="tickerInput"
                        placeholder="e.g., AAPL"
                        maxlength="10"
                        class="input uppercase"
                    >
                    
                    <button 
                        id="generateBtn"
                        class="btn btn-primary"
                    >
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                        </svg>
                        Generate Template
                    </button>
                </div>

                <div id="errorMessage" class="hidden mt-4 error-box"></div>
            </div>
        </div>

        <!-- Copy Button Section -->
        <div id="successSection" class="max-w-md mx-auto hidden">
            <div class="success-box">
                <div class="text-center mb-4">
                    <div class="inline-flex items-center gap-2 text-green-400 font-medium">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                        </svg>
                        <span id="readyText">Template Ready</span>
                    </div>
                </div>
                
                <button 
                    id="copyBtn"
                    class="btn btn-success"
                >
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                    </svg>
                    Copy to Clipboard
                </button>
                
                <div class="mt-4 text-xs text-gray-400 text-center">
                    <span id="templateInfo">Markdown template ready to use</span>
                </div>
            </div>
        </div>

        <!-- Preview Section -->
        <div id="previewSection" class="mt-8 max-w-4xl mx-auto hidden">
            <details class="preview-box">
                <summary class="p-4 text-white font-medium cursor-pointer">
                    Preview Content (Click to expand)
                </summary>
                <div class="p-4" style="border-top: 1px solid rgba(255,255,255,0.1);">
                    <pre id="previewContent" class="text-xs text-gray-300 whitespace-pre-wrap break-words max-h-96 overflow-y-auto"></pre>
                </div>
            </details>
        </div>
    </div>

    <script>
        let markdownContent = '';
        
        const TEMPLATE_URL = 'https://raw.githubusercontent.com/mrarogiewicz/prompts/refs/heads/main/stock_analysis_detail.md';
        
        const tickerInput = document.getElementById('tickerInput');
        const generateBtn = document.getElementById('generateBtn');
        const errorMessage = document.getElementById('errorMessage');
        const successSection = document.getElementById('successSection');
        const copyBtn = document.getElementById('copyBtn');
        const readyText = document.getElementById('readyText');
        const templateInfo = document.getElementById('templateInfo');
        const previewSection = document.getElementById('previewSection');
        const previewContent = document.getElementById('previewContent');

        // Auto-uppercase ticker input
        tickerInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.toUpperCase();
        });

        // Generate button click
        generateBtn.addEventListener('click', async () => {
            const ticker = tickerInput.value.trim();
            
            if (!ticker) {
                showError('Please enter a stock ticker');
                return;
            }

            setLoading(true);
            hideError();
            hideSuccess();

            try {
                const urls = [
                    'https://cdn.jsdelivr.net/gh/mrarogiewicz/prompts@main/stock_analysis_detail.md',
                    'https://raw.githubusercontent.com/mrarogiewicz/prompts/main/stock_analysis_detail.md',
                    'https://raw.githack.com/mrarogiewicz/prompts/main/stock_analysis_detail.md'
                ];
                
                let template = null;
                
                for (let i = 0; i < urls.length; i++) {
                    try {
                        console.log(`Trying URL ${i + 1}: ${urls[i]}`);
                        const response = await fetch(urls[i], {
                            method: 'GET',
                            mode: 'cors',
                            cache: 'no-cache'
                        });
                        
                        if (response.ok) {
                            template = await response.text();
                            if (template && template.includes('XXX') && template.length > 1000) {
                                console.log(`Success with URL ${i + 1}`);
                                break;
                            }
                        }
                    } catch (err) {
                        console.log(`URL ${i + 1} failed:`, err.message);
                        continue;
                    }
                }
                
                if (!template || !template.includes('XXX')) {
                    throw new Error('Could not fetch template from any URL');
                }
                
                markdownContent = template.replace(/XXX/g, ticker.toUpperCase());
                showSuccess(ticker);
                
            } catch (err) {
                console.error('Fetch error:', err);
                showError('Unable to fetch template automatically. Please try again.');
            } finally {
                setLoading(false);
            }
        });

        // Copy button click
        copyBtn.addEventListener('click', async () => {
            try {
                await navigator.clipboard.writeText(markdownContent);
                
                // Update button to show copied state
                copyBtn.innerHTML = `
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                    </svg>
                    Copied!
                `;
                
                setTimeout(() => {
                    copyBtn.innerHTML = `
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                        </svg>
                        Copy to Clipboard
                    `;
                }, 2000);
                
            } catch (err) {
                showError('Failed to copy to clipboard');
            }
        });

        // Helper functions
        function setLoading(loading) {
            if (loading) {
                generateBtn.disabled = true;
                generateBtn.innerHTML = `
                    <div class="spinner"></div>
                    Processing...
                `;
            } else {
                generateBtn.disabled = false;
                generateBtn.innerHTML = `
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                    </svg>
                    Generate Template
                `;
            }
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.remove('hidden');
        }

        function hideError() {
            errorMessage.classList.add('hidden');
        }

        function showSuccess(ticker) {
            readyText.textContent = `Template Ready for ${ticker}`;
            templateInfo.textContent = `Markdown template with ${ticker} ready to use`;
            previewContent.textContent = markdownContent;
            successSection.classList.remove('hidden');
            previewSection.classList.remove('hidden');
        }

        function hideSuccess() {
            successSection.classList.add('hidden');
            previewSection.classList.add('hidden');
        }
    </script>
</body>
</html>
